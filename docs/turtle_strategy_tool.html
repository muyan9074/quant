<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>海龟策略回测工具</title>
  <style>
    :root {
      --bg: #edf4f7;
      --panel: #ffffff;
      --soft: #f7faf9;
      --ink: #10201c;
      --muted: #64746f;
      --grid: #d9e5e1;
      --accent: #0f766e;
      --accent-2: #2563eb;
      --gold: #b7791f;
      --up: #dc2626;
      --down: #059669;
      --warn: #d97706;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, #dfeeed 0, #f7faf9 260px, var(--bg) 100%);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      font-variant-numeric: tabular-nums;
    }
    header {
      padding: 22px 24px 16px;
      color: #fff;
      background: linear-gradient(135deg, #06221f 0%, #0f766e 56%, #1d4ed8 100%);
      border-bottom: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 16px 42px rgba(15, 32, 28, .24);
    }
    .topline { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
    .brandline { display: flex; align-items: center; gap: 10px; }
    .brandmark {
      width: 34px; height: 34px; display: grid; place-items: center; border-radius: 8px;
      border: 1px solid rgba(255,255,255,.26); background: rgba(255,255,255,.12);
    }
    .brandmark svg, .icon svg, .metric-icon svg { width: 18px; height: 18px; display: block; }
    h1 { margin: 0 0 8px; font-size: 26px; letter-spacing: 0; }
    .meta { color: rgba(255,255,255,.82); font-size: 13px; display: flex; flex-wrap: wrap; gap: 10px 12px; }
    .meta span {
      border: 1px solid rgba(255,255,255,.24); background: rgba(255,255,255,.10);
      border-radius: 999px; padding: 4px 9px;
    }
    .run-badge {
      min-width: 126px; border: 1px solid rgba(255,255,255,.26); border-radius: 8px;
      padding: 8px 10px; background: rgba(255,255,255,.12); text-align: right;
    }
    .run-badge .label { color: rgba(255,255,255,.72); font-size: 11px; }
    .run-badge .value { margin-top: 2px; font-size: 15px; font-weight: 800; }
    main { display: grid; grid-template-columns: 354px minmax(0, 1fr); gap: 14px; padding: 14px; }
    .side, .content { display: grid; align-content: start; gap: 12px; min-width: 0; }
    .panel {
      position: relative; min-width: 0; padding: 14px; background: var(--panel);
      border: 1px solid var(--grid); border-radius: 8px; box-shadow: 0 12px 30px rgba(16, 32, 28, .075);
    }
    .panel::after {
      content: ""; position: absolute; inset: 0 0 auto 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(15,118,110,.35), transparent);
      pointer-events: none;
    }
    .panel-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    h2 { margin: 0 0 10px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .icon {
      width: 28px; height: 28px; display: inline-grid; place-items: center; flex: 0 0 auto;
      color: var(--accent); border-radius: 8px; background: #eefaf7; border: 1px solid #cce8e2;
    }
    label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    input, select, button {
      width: 100%; min-height: 34px; border: 1px solid var(--grid); border-radius: 6px;
      padding: 6px 8px; font: inherit; background: #fff;
    }
    input:focus, select:focus { outline: 2px solid rgba(15, 118, 110, .18); border-color: var(--accent); }
    button {
      background: linear-gradient(135deg, #0f766e, #2563eb 72%, #b7791f);
      color: #fff; border-color: var(--accent); font-weight: 700; cursor: pointer;
      box-shadow: 0 12px 26px rgba(15, 118, 110, .24);
      transition: transform .12s ease, box-shadow .12s ease;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 15px 30px rgba(15, 118, 110, .30); }
    button:disabled { cursor: wait; opacity: .78; transform: none; box-shadow: none; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .row { margin-bottom: 9px; }
    .source-block { display: none; }
    .source-block.active { display: block; }
    .checkrow { display: flex; align-items: center; gap: 8px; min-height: 30px; color: var(--ink); font-size: 13px; }
    .checkrow input { width: auto; min-height: auto; }
    .hint { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .status { min-height: 22px; margin-top: 9px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .status.is-loading { color: var(--accent); }
    .status.is-error { color: var(--up); font-weight: 700; }
    .contextbar { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .context-item {
      border: 1px solid var(--grid); border-radius: 8px; background: linear-gradient(180deg, #ffffff, #f7fbfa);
      padding: 10px 12px; min-width: 0; display: flex; align-items: center; gap: 10px;
    }
    .context-item .label { color: var(--muted); font-size: 11px; }
    .context-item .value { margin-top: 4px; font-size: 14px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cards { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; }
    .card {
      border: 1px solid var(--grid); border-radius: 8px; padding: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,250,249,.96));
      position: relative; overflow: hidden;
    }
    .metric-top { display: flex; align-items: center; gap: 7px; min-width: 0; }
    .metric-icon {
      width: 28px; height: 28px; display: inline-grid; place-items: center; border-radius: 8px;
      color: var(--accent); background: #eefaf7; border: 1px solid #cce8e2; flex: 0 0 auto;
    }
    .card .k { color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card .v { font-size: 22px; font-weight: 800; margin-top: 8px; }
    .card .s { margin-top: 5px; color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card.positive .v { color: var(--up); }
    .card.negative .v { color: var(--down); }
    .card.warn .v { color: var(--warn); }
    .tablewrap { width: 100%; overflow: auto; border: 1px solid var(--grid); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; }
    th, td { border-bottom: 1px solid var(--grid); padding: 8px 9px; text-align: right; white-space: nowrap; }
    th:first-child, td:first-child { text-align: left; }
    th { color: var(--muted); font-weight: 700; background: #f7faf9; }
    canvas { width: 100%; height: 360px; display: block; }
    #priceChart { height: 430px; }
    #atrChart { height: 260px; }
    @media (max-width: 1120px) {
      main { grid-template-columns: 1fr; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .contextbar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 620px) {
      header { padding: 18px 14px 14px; }
      main { padding: 10px; }
      .topline { display: grid; }
      .grid2, .cards, .contextbar { grid-template-columns: 1fr; }
      canvas, #priceChart { height: 330px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topline">
      <div>
        <div class="brandline">
          <span class="brandmark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 18h16"/><path d="M6 15l3-7 3 7 3-10 3 10"/><path d="M6 8h12"/>
            </svg>
          </span>
          <h1>海龟策略回测工具</h1>
        </div>
        <div class="meta">
          <span>默认数据：Tushare 前复权 qfq</span>
          <span>策略：Donchian 突破、ATR/N 仓位、2N 止损</span>
          <span>执行：收盘出信号，次日开盘成交</span>
        </div>
      </div>
      <div class="run-badge" aria-label="当前回测状态">
        <div class="label">当前状态</div>
        <div id="runBadge" class="value">待运行</div>
      </div>
    </div>
  </header>
  <main>
    <aside class="side">
      <section class="panel">
        <h2><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h10"/><path d="M7 4v16"/><path d="M17 4v8"/></svg></span>股票与数据</h2>
        <div class="row">
          <label for="dataSource">数据来源</label>
          <select id="dataSource">
            <option value="builtin" selected>内置前复权 CSV</option>
            <option value="worker">Cloudflare Worker 实时获取</option>
            <option value="upload">上传 CSV</option>
          </select>
        </div>
        <div id="workerFields" class="source-block">
          <div class="row">
            <label for="symbolsInput">股票代码</label>
            <input id="symbolsInput" value="603986.SH,601988.SH" placeholder="603986.SH,601988.SH,000001.SZ">
          </div>
          <div class="row">
            <label for="workerUrl">Cloudflare Worker 地址</label>
            <input id="workerUrl" placeholder="https://你的-worker.workers.dev">
          </div>
        </div>
        <div id="builtinFields" class="source-block active">
          <div class="hint">当前读取内置前复权 CSV：603986.SH、601988.SH。</div>
        </div>
        <div id="uploadFields" class="source-block">
          <div class="row">
            <label for="uploadCsv">上传 CSV</label>
            <input id="uploadCsv" type="file" accept=".csv" multiple>
            <div class="hint">CSV 需包含 trade_date、open、high、low、close。</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h9"/><path d="M17 6h3"/><circle cx="15" cy="6" r="2"/><path d="M4 12h3"/><path d="M11 12h9"/><circle cx="9" cy="12" r="2"/><path d="M4 18h11"/><path d="M19 18h1"/><circle cx="17" cy="18" r="2"/></svg></span>策略参数</h2>
        <div class="grid2">
          <div><label for="startDate">开始日期</label><input id="startDate" placeholder="YYYYMMDD"></div>
          <div><label for="endDate">结束日期</label><input id="endDate" placeholder="YYYYMMDD"></div>
          <div><label for="systemMode">系统模式</label><select id="systemMode"><option value="dual" selected>双系统</option><option value="short">20/10</option><option value="long">55/20</option></select></div>
          <div><label for="initialCash">初始资金</label><input id="initialCash" type="number" value="1000000" min="1"></div>
          <div><label for="entryShort">S1 入场</label><input id="entryShort" type="number" value="20" min="2"></div>
          <div><label for="exitShort">S1 退出</label><input id="exitShort" type="number" value="10" min="1"></div>
          <div><label for="entryLong">S2 入场</label><input id="entryLong" type="number" value="55" min="2"></div>
          <div><label for="exitLong">S2 退出</label><input id="exitLong" type="number" value="20" min="1"></div>
          <div><label for="atrWindow">ATR / N</label><input id="atrWindow" type="number" value="20" min="1"></div>
          <div><label for="treasuryYield">国债年化</label><input id="treasuryYield" type="number" value="0.02" step="0.001"></div>
          <div><label for="adjust">复权口径</label><select id="adjust"><option value="qfq">qfq 前复权</option></select></div>
        </div>
      </section>

      <section class="panel">
        <h2><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 4v5c0 5-3 8-7 9-4-1-7-4-7-9V7l7-4z"/><path d="M9 12l2 2 4-5"/></svg></span>仓位、成本与风控</h2>
        <div class="grid2">
          <div><label for="riskPerUnit">单位风险</label><input id="riskPerUnit" type="number" value="0.01" step="0.001"></div>
          <div><label for="maxUnits">最大单位</label><input id="maxUnits" type="number" value="4" min="1"></div>
          <div><label for="stopN">止损 N</label><input id="stopN" type="number" value="2" step="0.1"></div>
          <div><label for="addN">加仓 N</label><input id="addN" type="number" value="0.5" step="0.1"></div>
          <div><label for="buyCommission">买入佣金</label><input id="buyCommission" type="number" value="0.0003" step="0.0001"></div>
          <div><label for="sellCommission">卖出佣金</label><input id="sellCommission" type="number" value="0.0003" step="0.0001"></div>
          <div><label for="stampTax">印花税</label><input id="stampTax" type="number" value="0.0005" step="0.0001"></div>
          <div><label for="buySlippage">买入滑点</label><input id="buySlippage" type="number" value="0.0002" step="0.0001"></div>
          <div><label for="sellSlippage">卖出滑点</label><input id="sellSlippage" type="number" value="0.0002" step="0.0001"></div>
          <div><label for="maxDdPct">最大回撤停交易</label><input id="maxDdPct" type="number" value="0.20" step="0.01"></div>
        </div>
        <div class="checkrow"><input id="enableDrawdownStop" type="checkbox" checked><span>启用最大回撤停交易</span></div>
        <button id="runBtn">运行回测</button>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </section>
    </aside>

    <section class="content">
      <section class="contextbar" id="contextBar" aria-label="当前回测上下文"></section>
      <section class="panel"><div class="panel-head"><h2><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19h16"/><path d="M7 16V9"/><path d="M12 16V5"/><path d="M17 16v-4"/><path d="M7 9l5-4 5 7"/></svg></span>核心结果</h2></div><div id="cards" class="cards"></div></section>
      <section class="panel"><div class="panel-head"><h2><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/><path d="M8 4v16"/><path d="M16 4v16"/></svg></span>股票对比</h2></div><div class="tablewrap"><table id="summaryTable"></table></div></section>
      <section class="panel"><div class="panel-head"><h2><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18h16"/><path d="M5 15l4-4 3 3 6-8"/><path d="M5 10l4 2 3-4 6 3"/></svg></span>策略净值对比</h2></div><canvas id="navChart"></canvas></section>
      <section class="panel"><div class="panel-head"><h2><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18h16"/><path d="M6 15c3-8 5 2 8-6s5-1 6-4"/><path d="M6 10h3"/><path d="M15 14h3"/></svg></span>价格、通道与交易点</h2></div><canvas id="priceChart"></canvas></section>
      <section class="panel"><div class="panel-head"><h2><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18h16"/><path d="M5 15l3-4 4 2 6-7"/><path d="M5 8h14"/></svg></span>N / ATR</h2></div><canvas id="atrChart"></canvas></section>
      <section class="panel"><div class="panel-head"><h2><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12v18H6z"/><path d="M9 7h6"/><path d="M9 11h6"/><path d="M9 15h4"/></svg></span>交易明细</h2></div><div class="tablewrap"><table id="tradesTable"></table></div></section>
      <section class="panel"><div class="panel-head"><h2><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4-8 14L4 7l8-4z"/><path d="M12 8v5"/><path d="M12 17h.01"/></svg></span>风控事件</h2></div><div class="tablewrap"><table id="riskTable"></table></div></section>
    </section>
  </main>

  <script>
    const BUILTIN = [
      { symbol: '603986.SH', url: 'data/stocks/603986_SH_daily_qfq.csv' },
      { symbol: '601988.SH', url: 'data/stocks/601988_SH_daily_qfq.csv' }
    ];
    const $ = id => document.getElementById(id);
    const colors = ['#0f766e', '#2563eb', '#d97706', '#7c3aed', '#dc2626', '#475467'];

    function parseCsv(text) {
      const rows = [];
      let row = [], cell = '', quote = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];
        if (ch === '"' && quote && next === '"') { cell += '"'; i++; }
        else if (ch === '"') quote = !quote;
        else if (ch === ',' && !quote) { row.push(cell); cell = ''; }
        else if ((ch === '\n' || ch === '\r') && !quote) {
          if (ch === '\r' && next === '\n') i++;
          row.push(cell); cell = '';
          if (row.some(v => v !== '')) rows.push(row);
          row = [];
        } else cell += ch;
      }
      if (cell || row.length) { row.push(cell); rows.push(row); }
      if (!rows.length) return [];
      const headers = rows.shift().map(h => h.trim().replace(/^\uFEFF/, ''));
      return rows.map(r => Object.fromEntries(headers.map((h, i) => [h, r[i] ?? ''])));
    }
    function toNumber(v) { return Number(String(v ?? '').replace(/,/g, '')); }
    function normSymbol(s) { return String(s || '').trim().toUpperCase(); }
    function fmtPct(v) { return Number.isFinite(v) ? (v * 100).toFixed(2) + '%' : '--'; }
    function fmtNum(v, d = 2) {
      const decimals = Number.isInteger(d) && d >= 0 && d <= 20 ? d : 2;
      return Number.isFinite(v) ? v.toLocaleString(undefined, { maximumFractionDigits: decimals, minimumFractionDigits: decimals }) : '--';
    }
    function fmtDate(v) {
      const s = String(v || '').replace(/\D/g, '');
      return s.length === 8 ? `${s.slice(0, 4)}.${s.slice(4, 6)}.${s.slice(6, 8)}` : '--';
    }
    function translateReason(v) {
      return ({
        entry: '突破入场',
        add: '加仓',
        channel_exit: '通道退出',
        stop_loss: '2N 止损',
        max_drawdown_stop: '最大回撤停交易',
        end_of_backtest: '回测结束平仓'
      })[v] || v || '--';
    }
    function translateStatus(v) {
      return ({
        ok: '正常',
        executed: '已执行',
        not_executed_no_next_day: '未执行：无下一交易日',
        halted_no_position: '已停交易：无持仓'
      })[v] || v || '--';
    }
    function metricClass(value, inverse = false) {
      if (!Number.isFinite(value)) return 'info';
      const good = inverse ? value > -0.15 : value > 0;
      const bad = inverse ? value <= -0.20 : value < 0;
      if (good) return 'positive';
      if (bad) return 'negative';
      return 'info';
    }
    function iconSvg(name) {
      const icons = {
        trend: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17l6-6 4 4 6-9"/><path d="M14 6h6v6"/></svg>',
        calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v4"/><path d="M17 3v4"/><path d="M4 8h16"/><path d="M5 5h14v15H5z"/></svg>',
        hold: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 19V5"/><path d="M18 19V5"/><path d="M6 7h12"/><path d="M6 17h12"/><path d="M9 11h6"/></svg>',
        drawdown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l6 6 4-4 6 7"/><path d="M14 15h6v-6"/></svg>',
        ratio: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><circle cx="7" cy="7" r="2"/><circle cx="17" cy="17" r="2"/></svg>',
        shield: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 4v5c0 5-3 8-7 9-4-1-7-4-7-9V7z"/><path d="M9 12l2 2 4-5"/></svg>'
      };
      return icons[name] || icons.trend;
    }
    function setStatus(message, tone = 'idle') {
      $('status').textContent = message;
      $('status').classList.toggle('is-loading', tone === 'loading');
      $('status').classList.toggle('is-error', tone === 'error');
      $('runBadge').textContent = tone === 'loading' ? '运行中' : tone === 'error' ? '异常' : message ? '已完成' : '待运行';
    }
    function updateSourceFields() {
      const source = $('dataSource').value;
      $('builtinFields').classList.toggle('active', source === 'builtin');
      $('workerFields').classList.toggle('active', source === 'worker');
      $('uploadFields').classList.toggle('active', source === 'upload');
    }
    function sourceLabel() {

      renderContext(best, results);
      $('cards').innerHTML = best ? [
        { k: '策略累计收益', icon: 'trend', v: fmtPct(best.summary.strategy_return), s: best.symbol, cls: metricClass(best.summary.strategy_return) },
        { k: '策略年化收益', icon: 'calendar', v: fmtPct(best.summary.annual_return), s: '按 252 个交易日年化', cls: metricClass(best.summary.annual_return) },
        { k: '买入持有收益', icon: 'hold', v: fmtPct(best.summary.buy_hold_return), s: '同期持有标的表现', cls: metricClass(best.summary.buy_hold_return) },
        { k: '超额收益率', icon: 'trend', v: fmtPct(best.summary.excess_return), s: `相对国债 ${fmtPct(best.summary.treasury_return)}`, cls: metricClass(best.summary.excess_return) },
        { k: '最大回撤', icon: 'drawdown', v: fmtPct(best.summary.max_drawdown), s: '净值高点回撤', cls: metricClass(best.summary.max_drawdown, true) },
        { k: '夏普比率', icon: 'ratio', v: fmtNum(best.summary.sharpe, 3), s: '日收益年化波动调整', cls: metricClass(best.summary.sharpe) },
        { k: '胜率', icon: 'trend', v: fmtPct(best.summary.win_rate), s: `${best.summary.trade_count} 笔交易`, cls: metricClass(best.summary.win_rate - 0.5) },
        { k: '盈亏比', icon: 'ratio', v: fmtNum(best.summary.payoff, 2), s: '平均盈利 / 平均亏损', cls: metricClass(Number.isFinite(best.summary.payoff) ? best.summary.payoff - 1 : null) },
        { k: '加仓次数', icon: 'hold', v: String(best.summary.add_count), s: '所有交易累计', cls: 'info' },
        { k: '风控状态', icon: 'shield', v: best.summary.risk_triggered ? '已触发' : '未触发', s: `止损 ${best.summary.stop_loss_count} 次 / 回撤停交易 ${best.summary.drawdown_stop_triggered ? '是' : '否'}`, cls: best.summary.risk_triggered ? 'warn' : 'positive' }
      ].map(m => `<div class="card ${m.cls}"><div class="metric-top"><span class="metric-icon" aria-hidden="true">${iconSvg(m.icon)}</span><div class="k">${m.k}</div></div><div class="v">${m.v}</div><div class="s">${m.s}</div></div>`).join('') : '';
      table($('summaryTable'), results.map(r => r.summary), [
        { key: 'ts_code', label: '股票' }, { key: 'status', label: '状态', format: translateStatus },
        { key: 'start_date', label: '开始日', format: fmtDate }, { key: 'end_date', label: '结束日', format: fmtDate },
        { key: 'strategy_return', label: '策略收益', format: fmtPct }, { key: 'treasury_return', label: '国债同期收益', format: fmtPct }, { key: 'buy_hold_return', label: '买入持有', format: fmtPct },
        { key: 'excess_return', label: '超额收益率', format: fmtPct }, { key: 'annual_return', label: '年化收益', format: fmtPct },
        { key: 'max_drawdown', label: '最大回撤', format: fmtPct }, { key: 'sharpe', label: '夏普', format: v => fmtNum(v, 3) },
        { key: 'win_rate', label: '胜率', format: fmtPct }, { key: 'payoff', label: '盈亏比', format: v => fmtNum(v, 2) },
        { key: 'trade_count', label: '交易数' }, { key: 'add_count', label: '加仓数' }, { key: 'stop_loss_count', label: '止损数' },
        { key: 'drawdown_stop_triggered', label: '回撤停交易', format: v => v ? '是' : '否' }
      ]);
      if (!ok.length) {
        clearChart($('navChart'), 'No successful backtest data');
        clearChart($('priceChart'), 'No successful backtest data');
        clearChart($('atrChart'), 'No successful backtest data');
        table($('tradesTable'), [], []); table($('riskTable'), [], []);
        return;
      }
      const first = ok[0], dates = first.equity.map(e => e.trade_date);
      const navSets = ok.map(r => ({ name: `${r.symbol} 策略净值`, values: r.equity.map(e => e.strategy_nav) }));
      navSets.push({ name: `${first.symbol} 买入持有`, values: first.equity.map(e => e.buy_hold_nav), color: '#475467', width: 2 });
      drawLine($('navChart'), '策略净值对比', navSets, dates);
      const closeByDate = new Map(first.equity.map((e, i) => [e.trade_date, { i, close: e.close }]));
      const markers = [];
      first.events.forEach(ev => {
        const point = closeByDate.get(ev.date);
        if (!point) return;
        if (ev.type === 'buy') markers.push({ index: point.i, value: point.close, color: '#dc2626', direction: 'down' });
        if (ev.type === 'add') markers.push({ index: point.i, value: point.close, color: '#d97706', shape: 'square' });
        if (ev.type === 'sell') markers.push({ index: point.i, value: point.close, color: '#059669', direction: 'up' });
      });
      const mode = first.summary.system_mode || $('systemMode').value;
      const priceDatasets = [{
        name: '收盘价',
        values: first.equity.map(e => e.close),
        color: '#10201c',
        width: 2,
        markers,
        markerLegend: [
          { name: '买入', color: '#dc2626', direction: 'down' },
          { name: '加仓', color: '#d97706', shape: 'square' },
          { name: '卖出', color: '#059669', direction: 'up' }
        ]
      }];
      if (mode === 'short' || mode === 'dual') {
        priceDatasets.push(
          { name: 'S1 入场高点', values: first.equity.map(e => e.entry_high_short), color: '#0f766e', width: 1.6 },
          { name: 'S1 退出低点', values: first.equity.map(e => e.exit_low_short), color: '#d97706', width: 1.4 }
        );
      }
      if (mode === 'long' || mode === 'dual') {
        priceDatasets.push(
          { name: 'S2 入场高点', values: first.equity.map(e => e.entry_high_long), color: '#2563eb', width: 1.6 },
          { name: 'S2 退出低点', values: first.equity.map(e => e.exit_low_long), color: '#7c3aed', width: 1.4 }
        );
      }
      priceDatasets.push({ name: '止损价', values: first.equity.map(e => e.stop_price), color: '#dc2626', width: 1.4 });
      drawLine($('priceChart'), `${first.symbol} 价格、Donchian 通道与交易点`, priceDatasets, dates);
      drawLine($('atrChart'), `${first.symbol} N / ATR`, [{ name: 'N', values: first.equity.map(e => e.n), color: '#0f766e', width: 2 }], dates);
      table($('tradesTable'), first.trades, [
        { key: 'system', label: '系统' }, { key: 'entry_date', label: '买入日', format: fmtDate }, { key: 'exit_date', label: '卖出日', format: fmtDate },
        { key: 'exit_reason', label: '原因', format: translateReason }, { key: 'units', label: '单位' }, { key: 'add_count', label: '加仓' },
        { key: 'avg_entry_price', label: '均价', format: fmtNum }, { key: 'exit_price', label: '卖出价', format: fmtNum },
        { key: 'holding_days', label: '持有天数' }, { key: 'net_return', label: '净收益', format: fmtPct }, { key: 'total_cost', label: '成本', format: fmtNum }
      ]);
      table($('riskTable'), first.risks, [
        { key: 'event_date', label: '触发日', format: fmtDate }, { key: 'event_type', label: '类型', format: translateReason },
        { key: 'trigger_value', label: '触发值', format: v => Number.isFinite(v) && Math.abs(v) < 1 ? fmtPct(v) : fmtNum(v) },
        { key: 'threshold', label: '阈值', format: v => Number.isFinite(v) && Math.abs(v) < 1 ? fmtPct(v) : fmtNum(v) },
        { key: 'execution_date', label: '执行日', format: fmtDate }, { key: 'execution_price', label: '执行价', format: fmtNum },
        { key: 'status', label: '状态', format: translateStatus }
      ]);
    }
    $('runBtn').addEventListener('click', async () => {
      try {
        $('runBtn').disabled = true;
        $('runBtn').textContent = '回测运行中...';
        setStatus(`正在读取数据并回测... 数据来源：${sourceLabel()}`, 'loading');
        const params = readParams();
        const sets = await loadDataSets();
        const results = sets.map(set => {
          if (set.fetchStatus && set.fetchStatus !== 'ok') return { symbol: set.symbol, summary: { ts_code: set.symbol, status: set.fetchError || `Worker ${set.fetchStatus}` } };
          if (!Array.isArray(set.rows) || !set.rows.length) return { symbol: set.symbol, summary: { ts_code: set.symbol, status: '没有可用行情数据' } };
          try { return runBacktest(set.symbol, set.rows, params); }
          catch (err) { return { symbol: set.symbol, summary: { ts_code: set.symbol, status: err.message } }; }
        });
        render(results);
        setStatus(`完成：${results.length} 支股票，${results.filter(r => r.summary.status === 'ok').length} 支成功。数据来源：${sourceLabel()}。`, 'done');
      } catch (err) {
        setStatus(`错误：${err.message}`, 'error');
      } finally {
        $('runBtn').disabled = false;
        $('runBtn').textContent = '运行回测';
      }
    });
    $('dataSource').addEventListener('change', updateSourceFields);
    updateSourceFields();
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => $('runBtn').click(), 160);
    });
    $('runBtn').click();
  </script>
</body>
</html>
